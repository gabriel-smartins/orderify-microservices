spring:
  application:
    name: notification
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: flase
  #Rabbitmq Config
  rabbitmq:
    host: localhost
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}
    port: 5672


#Rabbitmq Custom Config
rabbitmq:
  exchange:
    name: orders.v1.order-created
  queue:
    name: orders.v1.order-created.generate-notification